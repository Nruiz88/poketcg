<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — PokéTCG</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ===== Variables ===== */
    :root {
      --yellow: #ffcb05;
      --yellow-dark: #c9a104;
      --bg: #0a0a0f;
      --bg-card: rgba(255,255,255,0.03);
      --text: #f0f0f0;
      --text-muted: #a0a0a8;
      --text-dim: #555;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --font-pixel: 'Press Start 2P', monospace;
      --font: 'Inter', system-ui, sans-serif;
      --shadow: 0 4px 16px rgba(0,0,0,0.4);
      --radius: 12px;
    }

    /* ===== Reset / Base ===== */
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== Backgrounds (matching landing) ===== */
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px,
          rgba(255,203,5,0.015) 2px, rgba(255,203,5,0.015) 4px);
      pointer-events: none; z-index: 9998;
    }

    body::after {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,203,5,0.03), transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(100,60,200,0.03), transparent 60%);
      pointer-events: none; z-index: -1;
    }

    /* card back pattern */
    .bg-pattern {
      position: fixed; inset: 0;
      background:
        linear-gradient(45deg, transparent 18px, rgba(255,203,5,0.015) 18px, rgba(255,203,5,0.015) 20px, transparent 20px),
        linear-gradient(-45deg, transparent 18px, rgba(255,203,5,0.015) 18px, rgba(255,203,5,0.015) 20px, transparent 20px);
      background-size: 40px 40px;
      pointer-events: none; z-index: -1;
    }

    /* foil texture */
    .bg-foil {
      position: fixed; inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 3px,
          rgba(255,255,255,0.01) 3px, rgba(255,255,255,0.01) 4px),
        repeating-linear-gradient(0deg, transparent, transparent 3px,
          rgba(255,255,255,0.01) 3px, rgba(255,255,255,0.01) 4px);
      pointer-events: none; z-index: -1; opacity: 0.5;
    }

    /* playmat grid */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: -1;
    }

    /* ===== Layout ===== */
    .app {
      max-width: 1360px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
      position: relative;
      z-index: 1;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 2px solid var(--border);
    }

    .logo {
      font-family: var(--font-pixel);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo span { color: var(--yellow); }
    .logo .pixel-ball {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--yellow);
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, var(--yellow), var(--yellow-dark));
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--yellow);
      image-rendering: pixelated;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
    }
    .btn-logout {
      padding: 0.4rem 0.8rem;
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.75rem;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover {
      background: rgba(255,80,80,0.1);
      border-color: rgba(255,80,80,0.25);
      color: #f66;
    }

    /* ===== Auth Box ===== */
    .auth-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      gap: 1.5rem;
    }
    .auth-box .pixel-ball-big {
      width: 64px; height: 64px;
      border: 3px solid var(--yellow);
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, var(--yellow), var(--yellow-dark));
      box-shadow: 0 0 0 3px var(--bg), 0 0 0 4px var(--yellow), var(--shadow);
      image-rendering: pixelated;
    }
    .auth-box h2 {
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.8;
    }
    .auth-box h2 span { color: var(--yellow); }

    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1.5rem;
      background: #fff;
      color: #222;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }
    .btn-google:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }

    /* ===== Stats Bar ===== */
    .stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      flex: 1;
      min-width: 120px;
      padding: 1rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
    }
    .stat-card .num {
      font-family: var(--font-pixel);
      font-size: 0.8rem;
      color: var(--yellow);
    }
    .stat-card .label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.3rem;
    }

    /* ===== Admin Grid ===== */
    .admin-grid {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width:900px) {
      .admin-grid { grid-template-columns: 1fr; }
    }

    /* ===== Panel ===== */
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .panel:hover { border-color: var(--border-hover); }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .panel-header .icon {
      width: 24px; height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,203,5,0.1);
      border: 1px solid rgba(255,203,5,0.2);
      border-radius: 6px;
      font-size: 0.75rem;
    }
    .panel-header h3 {
      font-family: var(--font-pixel);
      font-size: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    /* ===== Form ===== */
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 0.7rem;
    }
    .form-row label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-row input,
    .form-row select {
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font);
      outline: none;
      transition: border 0.2s, background 0.2s;
    }
    .form-row input:focus,
    .form-row select:focus {
      border-color: var(--yellow);
      background: rgba(255,203,5,0.04);
    }
    .form-row select option { background: #1a1a1a; }
    .form-row .hint {
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .form-row-inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width:500px) {
      .form-row-inline { grid-template-columns: 1fr; }
    }

    .form-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.8rem;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-primary {
      background: var(--yellow);
      color: #0a0a0f;
    }
    .btn-primary:hover {
      background: var(--yellow-dark);
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-danger {
      background: rgba(255,60,60,0.12);
      color: #f66;
      border: 1px solid rgba(255,60,60,0.2);
    }
    .btn-danger:hover {
      background: rgba(255,60,60,0.2);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    /* ===== Table ===== */
    .table-wrap {
      overflow-x: auto;
      margin: 0 -0.25rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    thead th {
      text-align: left;
      padding: 0.5rem 0.6rem;
      font-weight: 700;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    tbody tr {
      transition: background 0.15s;
    }
    tbody tr:hover {
      background: rgba(255,255,255,0.03);
    }
    tbody td {
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      vertical-align: middle;
    }
    tbody tr:last-child td {
      border-bottom: none;
    }
    .cell-name {
      font-weight: 600;
      white-space: nowrap;
    }
    .cell-set {
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    .cell-price {
      color: var(--yellow);
      font-weight: 700;
      white-space: nowrap;
    }
    .cell-rarity {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .rarity-badge.rare { background: rgba(60,120,255,0.15); color: #6af; border:1px solid rgba(60,120,255,0.2); }
    .rarity-badge.ultra { background: rgba(255,60,60,0.15); color: #f66; border:1px solid rgba(255,60,60,0.2); }
    .rarity-badge.secret { background: rgba(255,203,5,0.15); color: var(--yellow); border:1px solid rgba(255,203,5,0.2); }
    .rarity-badge.sar { background: rgba(200,100,255,0.15); color: #d7f; border:1px solid rgba(200,100,255,0.2); }

    .cell-actions {
      display: flex;
      gap: 0.25rem;
      justify-content: flex-end;
    }
    .btn-icon {
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-icon:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }
    .btn-icon.delete:hover {
      border-color: rgba(255,60,60,0.3);
      color: #f66;
      background: rgba(255,60,60,0.1);
    }

    /* ===== Image Upload ===== */
    .upload-btn {
      cursor: pointer;
    }
    .upload-label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1rem;
      border: 1px dashed var(--border);
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .upload-label:hover {
      border-color: var(--yellow);
      color: var(--yellow);
      background: rgba(255,203,5,0.04);
    }
    .upload-preview {
      position: relative;
      width: 100px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .upload-preview img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 5/7;
      object-fit: cover;
    }
    .upload-preview .remove-img {
      position: absolute;
      top: 4px; right: 4px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.7);
      border-color: transparent;
      color: #fff;
      font-size: 0.6rem;
      border-radius: 4px;
    }
    .upload-preview .remove-img:hover {
      background: rgba(200,40,40,0.8);
      border-color: transparent;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-dim);
    }
    .empty-state .empty-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      opacity: 0.3;
    }
    .empty-state p {
      font-size: 0.85rem;
    }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .toast {
      padding: 0.75rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: rgba(58,170,53,0.2); border: 1px solid rgba(58,170,53,0.3); color: #6c6; }
    .toast.error { background: rgba(200,60,60,0.2); border: 1px solid rgba(200,60,60,0.3); color: #f66; }

    /* ===== Loading Spinner ===== */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,203,5,0.2);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="bg-pattern"></div>
  <div class="bg-foil"></div>
  <div class="bg-grid"></div>

  <div class="app">

    <!-- ===== HEADER ===== -->
    <header class="header">
      <div class="logo">
        <span class="pixel-ball"></span>
        Poké<span>TCG</span>
        <span style="font-size:0.35rem;color:var(--text-dim);margin-left:0.5rem;">· Admin</span>
      </div>
      <div class="user-area" id="user-area" style="display:none;">
        <img class="user-avatar" id="user-avatar" src="" alt="">
        <span id="user-email"></span>
        <button class="btn-logout" id="btn-logout">Salir</button>
      </div>
    </header>

    <!-- ===== AUTH ===== -->
    <div class="auth-box" id="auth-box">
      <div class="pixel-ball-big"></div>
      <h2>Accedé al panel de <span>PokéTCG</span> para gestionar tu colección</h2>
      <button class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuar con Google
      </button>
    </div>

    <!-- ===== ADMIN PANEL ===== -->
    <div id="admin-panel" style="display:none;">

      <!-- Stats -->
      <div class="stats" id="stats-bar">
        <div class="stat-card">
          <div class="num" id="stat-total">0</div>
          <div class="label">Cartas</div>
        </div>
        <div class="stat-card">
          <div class="num" id="stat-rarity">0</div>
          <div class="label">Sets</div>
        </div>
        <div class="stat-card">
          <div class="num" id="stat-value" style="font-size:0.6rem;">$0</div>
          <div class="label">Valor total</div>
        </div>
      </div>

      <div class="admin-grid">

        <!-- ===== FORM ===== -->
        <div class="panel" id="form-panel">
          <div class="panel-header">
            <div class="icon" id="form-icon">✦</div>
            <h3 id="form-title">Agregar carta</h3>
          </div>
          <form id="card-form">
            <input type="hidden" id="edit-id">

            <div class="form-row">
              <label>Nombre</label>
              <input type="text" id="f-name" placeholder="Pikachu VMAX" required autocomplete="off">
            </div>

            <div class="form-row">
              <label>Expansión</label>
              <input type="text" id="f-set" placeholder="Evolving Skies" required autocomplete="off">
            </div>

            <div class="form-row-inline">
              <div class="form-row">
                <label>Rareza</label>
                <select id="f-rarity">
                  <option value="rare">Rare</option>
                  <option value="ultra">Ultra</option>
                  <option value="secret">Secret</option>
                  <option value="sar">SAR</option>
                </select>
              </div>
              <div class="form-row">
                <label>Tipo</label>
                <select id="f-type">
                  <option value="electric">⚡ Eléctrico</option>
                  <option value="fire">🔥 Fuego</option>
                  <option value="water">💧 Agua</option>
                  <option value="grass">🌱 Planta</option>
                  <option value="psychic">🌀 Psíquico</option>
                  <option value="dark">🌙 Siniestro</option>
                  <option value="dragon">🐉 Dragón</option>
                  <option value="metal">⚙️ Metal</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <label>Precio $</label>
              <input type="number" id="f-price" step="0.01" min="0" placeholder="24.99" required>
            </div>

            <div class="form-row">
              <label>Imagen de la carta</label>
              <div style="display:flex;gap:0.75rem;align-items:flex-start;flex-wrap:wrap;">
                <label class="upload-btn">
                  <input type="file" id="f-image" accept="image/*" style="display:none;">
                  <span class="upload-label">Seleccionar archivo</span>
                </label>
                <div class="upload-preview" id="upload-preview" style="display:none;">
                  <img id="preview-img" alt="preview">
                  <button type="button" class="btn-icon remove-img" id="remove-img" title="Quitar imagen">✕</button>
                </div>
              </div>
              <span class="hint">Formatos: JPG, PNG, WEBP. Tamaño recomendado: 350x490px.</span>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary" id="btn-submit">
                <span id="btn-submit-text">Guardar</span>
              </button>
              <button type="button" class="btn btn-secondary" id="btn-cancel" style="display:none;">Cancelar</button>
            </div>
          </form>
        </div>

        <!-- ===== TABLE ===== -->
        <div class="panel">
          <div class="panel-header">
            <div class="icon">📋</div>
            <h3>Cartas <span id="table-count" style="color:var(--yellow);">(0)</span></h3>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nombre</th>
                  <th>Expansión</th>
                  <th>Rareza</th>
                  <th>Precio</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="cards-tbody"></tbody>
            </table>
            <div class="empty-state" id="empty-msg">
              <div class="empty-icon">📦</div>
              <p>No hay cartas todavía. Agregá la primera desde el formulario.</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    (function() {
      /* ===== Refs ===== */
      var authBox = document.getElementById('auth-box');
      var adminPanel = document.getElementById('admin-panel');
      var userArea = document.getElementById('user-area');
      var userAvatar = document.getElementById('user-avatar');
      var userEmail = document.getElementById('user-email');
      var btnGoogle = document.getElementById('btn-google');
      var btnLogout = document.getElementById('btn-logout');
      var cardForm = document.getElementById('card-form');
      var editId = document.getElementById('edit-id');
      var fName = document.getElementById('f-name');
      var fSet = document.getElementById('f-set');
      var fRarity = document.getElementById('f-rarity');
      var fType = document.getElementById('f-type');
      var fPrice = document.getElementById('f-price');
      var fImage = document.getElementById('f-image');
      var previewWrap = document.getElementById('upload-preview');
      var previewImg = document.getElementById('preview-img');
      var removeImgBtn = document.getElementById('remove-img');
      var btnSubmit = document.getElementById('btn-submit');
      var btnSubmitText = document.getElementById('btn-submit-text');
      var btnCancel = document.getElementById('btn-cancel');
      var formTitle = document.getElementById('form-title');
      var formIcon = document.getElementById('form-icon');
      var tbody = document.getElementById('cards-tbody');
      var emptyMsg = document.getElementById('empty-msg');
      var tableCount = document.getElementById('table-count');
      var toastContainer = document.getElementById('toast-container');
      var statTotal = document.getElementById('stat-total');
      var statRarity = document.getElementById('stat-rarity');
      var statValue = document.getElementById('stat-value');

      var editingId = null;
      var cardsRef = db.collection('cards');
      var unsubscribe = null;
      var allDocs = [];

      // Imagen temporal: file a subir o null si no cambia
      var pendingImageFile = null;
      var existingImageUrl = null; // al editar, la URL actual

      /* ===== Preview ===== */
      fImage.addEventListener('change', function() {
        var file = fImage.files[0];
        if (!file) return;
        pendingImageFile = file;
        var reader = new FileReader();
        reader.onload = function(e) {
          previewImg.src = e.target.result;
          previewWrap.style.display = 'block';
        };
        reader.readAsDataURL(file);
      });

      removeImgBtn.addEventListener('click', function() {
        fImage.value = '';
        pendingImageFile = null;
        previewWrap.style.display = 'none';
      });

      /* ===== Auth ===== */
      function showAdmin(user) {
        authBox.style.display = 'none';
        adminPanel.style.display = 'block';
        userArea.style.display = 'flex';
        userEmail.textContent = user.email;
        if (user.photoURL) userAvatar.src = user.photoURL;
      }

      function showAuth() {
        authBox.style.display = 'flex';
        adminPanel.style.display = 'none';
        userArea.style.display = 'none';
        if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      }

      auth.onAuthStateChanged(function(user) {
        if (user) {
          showAdmin(user);
          loadCards();
        } else {
          showAuth();
        }
      });

      btnGoogle.addEventListener('click', function() {
        var provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(function(err) {
          showToast('Error: ' + err.message, 'error');
        });
      });

      btnLogout.addEventListener('click', function() {
        auth.signOut();
      });

      /* ===== Toast ===== */
      function showToast(msg, type) {
        var el = document.createElement('div');
        el.className = 'toast ' + type;
        el.textContent = msg;
        toastContainer.appendChild(el);
        requestAnimationFrame(function() {
          el.classList.add('show');
        });
        setTimeout(function() {
          el.classList.remove('show');
          setTimeout(function() { el.remove(); }, 300);
        }, 3000);
      }

      /* ===== Load cards ===== */
      function loadCards() {
        if (unsubscribe) unsubscribe();
        unsubscribe = cardsRef.orderBy('id', 'asc').onSnapshot(function(snapshot) {
          allDocs = [];
          snapshot.forEach(function(doc) { allDocs.push({ id: doc.id, data: doc.data() }); });
          renderTable(allDocs);
          updateStats(allDocs);
        }, function(err) {
          showToast('Error al cargar: ' + err.message, 'error');
        });
      }

      function updateStats(docs) {
        statTotal.textContent = docs.length;

        var setMap = {};
        var totalVal = 0;
        docs.forEach(function(d) {
          setMap[d.data.setName] = true;
          totalVal += d.data.price || 0;
        });
        statRarity.textContent = Object.keys(setMap).length;
        statValue.textContent = '$' + totalVal.toFixed(0);
      }

      function rarityLabel(r) {
        return { rare: 'Rare', ultra: 'Ultra', secret: 'Secret', sar: 'SAR' }[r] || r;
      }

      function rarityClass(r) {
        return { rare: 'rare', ultra: 'ultra', secret: 'secret', sar: 'sar' }[r] || '';
      }

      function renderTable(docs) {
        tableCount.textContent = '(' + docs.length + ')';

        if (docs.length === 0) {
          tbody.innerHTML = '';
          emptyMsg.style.display = 'block';
          return;
        }
        emptyMsg.style.display = 'none';

        tbody.innerHTML = docs.map(function(doc) {
          var d = doc.data();
          var hasImg = d.imageUrl ? ' 🖼' : '';
          return (
            '<tr>' +
              '<td style="color:var(--text-dim);font-size:0.7rem;">#' + String(d.id).padStart(3, '0') + '</td>' +
              '<td><span class="cell-name">' + escHtml(d.name) + hasImg + '</span></td>' +
              '<td><span class="cell-set">' + escHtml(d.setName) + '</span></td>' +
              '<td><span class="cell-rarity rarity-badge ' + rarityClass(d.rarity) + '">' + rarityLabel(d.rarity) + '</span></td>' +
              '<td><span class="cell-price">$' + d.price.toFixed(2) + '</span></td>' +
              '<td><div class="cell-actions">' +
                '<button class="btn-icon" onclick="editCard(\'' + doc.id + '\')" title="Editar">✎</button>' +
                '<button class="btn-icon delete" onclick="deleteCard(\'' + doc.id + '\')" title="Eliminar">✕</button>' +
              '</div></td>' +
            '</tr>'
          );
        }).join('');
      }

      function escHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      /* ===== Upload image a Storage ===== */
      function uploadImage(file, cardDocId) {
        if (!file) return Promise.resolve(null);

        var ref = storage.ref('cards/' + cardDocId + '_' + Date.now() + '.' + file.name.split('.').pop());
        return ref.put(file).then(function(snapshot) {
          return snapshot.ref.getDownloadURL();
        });
      }

      /* ===== CRUD ===== */

      // Submit
      cardForm.addEventListener('submit', function(e) {
        e.preventDefault();

        btnSubmit.disabled = true;
        btnSubmitText.textContent = 'Subiendo…';

        var cardData = {
          name: fName.value.trim(),
          setName: fSet.value.trim(),
          rarity: fRarity.value,
          type: fType.value,
          price: parseFloat(fPrice.value) || 0
        };

        function saveCard(imageUrl) {
          if (imageUrl) cardData.imageUrl = imageUrl;

          if (editingId) {
            // merge para no borrar imageUrl si no se subió nueva
            var updateData = {
              name: cardData.name,
              setName: cardData.setName,
              rarity: cardData.rarity,
              type: cardData.type,
              price: cardData.price
            };
            if (imageUrl) updateData.imageUrl = imageUrl;
            return cardsRef.doc(editingId).update(updateData);
          } else {
            return cardsRef.orderBy('id', 'desc').limit(1).get().then(function(snapshot) {
              var nextId = 1;
              snapshot.forEach(function(doc) { nextId = doc.data().id + 1; });
              cardData.id = nextId;
              return cardsRef.add(cardData);
            });
          }
        }

        var savePromise;

        if (pendingImageFile) {
          // 1. obtener docId temporal para la ruta de storage
          if (editingId) {
            savePromise = uploadImage(pendingImageFile, editingId).then(saveCard);
          } else {
            // crear doc vacío primero para obtener ID
            var tempRef = cardsRef.doc();
            savePromise = uploadImage(pendingImageFile, tempRef.id).then(function(url) {
              return saveCard(url);
            });
          }
        } else {
          // sin imagen nueva
          savePromise = saveCard(null);
        }

        savePromise.then(function() {
          showToast(editingId ? 'Carta actualizada' : 'Carta agregada', 'success');
          resetForm();
        }).catch(function(err) {
          showToast('Error: ' + err.message, 'error');
        }).then(function() {
          btnSubmit.disabled = false;
          btnSubmitText.textContent = editingId ? 'Actualizar' : 'Guardar';
        });
      });

      // Edit (global)
      window.editCard = function(docId) {
        cardsRef.doc(docId).get().then(function(doc) {
          if (!doc.exists) return;
          var d = doc.data();
          editingId = docId;
          existingImageUrl = d.imageUrl || null;
          editId.value = d.id;
          fName.value = d.name;
          fSet.value = d.setName;
          fRarity.value = d.rarity;
          fType.value = d.type;
          fPrice.value = d.price;

          // mostrar preview si tiene imagen
          if (d.imageUrl) {
            previewImg.src = d.imageUrl;
            previewWrap.style.display = 'block';
          } else {
            previewWrap.style.display = 'none';
          }
          pendingImageFile = null;
          fImage.value = '';

          formTitle.textContent = 'Editar carta';
          formIcon.textContent = '✎';
          btnSubmitText.textContent = 'Actualizar';
          btnCancel.style.display = 'inline-flex';
          document.getElementById('form-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
          fName.focus();
        }).catch(function(err) {
          showToast('Error: ' + err.message, 'error');
        });
      };

      // Delete (global)
      window.deleteCard = function(docId) {
        if (!confirm('¿Eliminar esta carta?')) return;
        cardsRef.doc(docId).delete().then(function() {
          showToast('Carta eliminada', 'success');
        }).catch(function(err) {
          showToast('Error: ' + err.message, 'error');
        });
      };

      // Cancel
      btnCancel.addEventListener('click', resetForm);

      function resetForm() {
        editingId = null;
        existingImageUrl = null;
        editId.value = '';
        cardForm.reset();
        fImage.value = '';
        pendingImageFile = null;
        previewWrap.style.display = 'none';
        formTitle.textContent = 'Agregar carta';
        formIcon.textContent = '✦';
        btnSubmitText.textContent = 'Guardar';
        btnCancel.style.display = 'none';
        btnSubmit.disabled = false;
      }
    })();
  </script>
</body>
</html>
